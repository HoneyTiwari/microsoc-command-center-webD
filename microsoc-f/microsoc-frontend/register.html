<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MicroSOC Command Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/light-theme.css" id="theme-style">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                    <h1>Register New Account</h1>
                </div>
                <p class="subtitle">Create your MicroSOC Command Center account</p>
            </div>

            <form id="register-form" class="login-form">
                <div class="form-group">
                    <label for="name">
                        <i class="fas fa-user"></i> Full Name
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Enter your full name"
                        required>
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="•••••••• (min. 6 characters)"
                        minlength="6"
                        required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="••••••••"
                        minlength="6"
                        required>
                </div>

                <div class="form-group">
                    <label for="role">
                        <i class="fas fa-user-tag"></i> Role
                    </label>
                    <select id="role" name="role">
                        <option value="analyst">Security Analyst</option>
                        <option value="viewer">Viewer (Read-only)</option>
                    </select>
                    <small style="color: var(--text-secondary); margin-top: 5px; display: block;">
                        Note: Admin role can only be assigned by existing administrators
                    </small>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>

                <div class="form-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                    <p class="warning"><i class="fas fa-exclamation-triangle"></i> All accounts require administrator approval</p>
                </div>
            </form>

            <div class="login-footer">
                <p>© 2024 Power Rangers Security Division</p>
                <p>Authorized personnel registration only</p>
            </div>
        </div>
    </div>

    <script>
        // Registration functionality
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('register-form');
            
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const role = document.getElementById('role').value;
                
                // Validation
                if (password !== confirmPassword) {
                    alert('Passwords do not match');
                    return;
                }
                
                if (password.length < 6) {
                    alert('Password must be at least 6 characters');
                    return;
                }
                
                try {
                    const response = await fetch('http://localhost:5001/api/auth/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ name, email, password, role })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        alert('Registration successful! You can now login.');
                        window.location.href = 'login.html';
                    } else {
                        alert(data.message || 'Registration failed');
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    alert('Failed to connect to server');
                }
            });
        });
    </script>
</body>
</html>
